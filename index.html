<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>⚔️</text></svg>">
    <title>Life RPG</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a14;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 15px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        .app { max-width: 450px; margin: 0 auto; padding-bottom: 30px; }
        h1 {
            text-align: center;
            font-size: 22px;
            margin: 8px 0 5px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.3);
        }
        .subtitle {
            text-align: center;
            font-size: 10px;
            color: #555;
            margin-bottom: 12px;
        }
        .level-card {
            background: linear-gradient(135deg, #14142a, #1a1040);
            border-radius: 18px;
            padding: 18px 15px;
            margin-bottom: 12px;
            text-align: center;
            border: 1px solid #2a2a4a;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .big-level {
            font-size: 44px;
            font-weight: 900;
            color: #ffd700;
            letter-spacing: 1px;
        }
        .big-title {
            font-size: 10px;
            color: #777;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .xp-bar-bg {
            background: #1a1a30;
            border-radius: 20px;
            height: 14px;
            margin: 10px 0 5px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            border-radius: 20px;
            transition: width 0.4s ease;
            box-shadow: 0 0 10px rgba(255,215,0,0.3);
        }
        .xp-text {
            font-size: 10px;
            color: #777;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }
        .stat-card {
            background: #111122;
            border-radius: 14px;
            padding: 14px 10px;
            text-align: center;
            border: 1px solid #222244;
            transition: all 0.2s;
        }
        .stat-card:active { transform: scale(0.97); }
        .stat-icon { font-size: 32px; margin-bottom: 2px; }
        .stat-name {
            font-size: 10px;
            color: #888;
            margin: 3px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-level {
            font-weight: 700;
            color: #ffd700;
            font-size: 15px;
        }
        .stat-xp { font-size: 9px; color: #555; margin: 2px 0; }
        .stat-card .xp-bar-bg { height: 8px; margin: 6px 0 0; }
        .stat-card .xp-bar-fill { border-radius: 20px; }
        .section-title {
            font-size: 12px;
            font-weight: 700;
            color: #666;
            margin: 16px 0 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .task {
            background: #111122;
            border-radius: 14px;
            padding: 13px 15px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #1e1e3a;
            transition: all 0.2s;
        }
        .task.completed {
            opacity: 0.55;
            border-color: #1a3a1a;
            background: #0d0d1a;
        }
        .task.completed .task-name { text-decoration: line-through; color: #555; }
        .task-info { flex: 1; min-width: 0; padding-right: 10px; }
        .task-name { font-size: 13px; font-weight: 500; line-height: 1.2; }
        .task-reward {
            font-size: 10px;
            color: #ffaa00;
            margin-top: 3px;
        }
        .btn {
            padding: 9px 15px;
            border-radius: 25px;
            border: none;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            min-width: 44px;
            text-align: center;
        }
        .btn:active { transform: scale(0.93); }
        .btn-done {
            background: #1a5c2a;
            color: #fff;
            border: 1px solid #2e7d32;
        }
        .btn-undo {
            background: #333;
            color: #aaa;
            border: 1px solid #444;
        }
        .daily-bonus {
            background: linear-gradient(135deg, #111122, #191030);
            border: 1px solid #3d2a6e;
        }
        .sleep-section {
            background: #111122;
            border-radius: 14px;
            padding: 16px;
            margin: 10px 0;
            text-align: center;
            border: 1px solid #1e1e3a;
        }
        .sleep-status {
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: 500;
        }
        .btn-sleep, .btn-wake {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            border-radius: 30px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .btn-sleep {
            background: linear-gradient(135deg, #1a237e, #283593);
            color: #fff;
            border: none;
        }
        .btn-wake {
            background: linear-gradient(135deg, #e65100, #ff8f00);
            color: #fff;
            border: none;
        }
        .penalty-warn {
            color: #ff5252;
            font-size: 10px;
            margin-top: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100%{opacity:0.7;}50%{opacity:1;}
        }
        .log {
            background: #080812;
            border-radius: 10px;
            padding: 10px 14px;
            max-height: 140px;
            overflow-y: auto;
            font-size: 10px;
            color: #555;
            margin-top: 8px;
            border: 1px solid #1a1a2a;
        }
        .log-item { margin: 3px 0; font-family: monospace; }
        .xp-popup {
            position: fixed;
            pointer-events: none;
            font-weight: 900;
            font-size: 18px;
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700;
            animation: floatUp 1s ease-out forwards;
            z-index: 100;
        }
        @keyframes floatUp {
            0%{opacity:1;transform:translateY(0) scale(1);}
            100%{opacity:0;transform:translateY(-60px) scale(1.4);}
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <h1>⚔️ Life RPG</h1>
        <div class="subtitle">Прокачка в реальной жизни</div>

        <!-- Общий уровень -->
        <div class="level-card" id="globalCard">
            <div class="big-title">Общий уровень</div>
            <div class="big-level" id="globalLevel">Ур. 1</div>
            <div class="xp-bar-bg"><div class="xp-bar-fill" id="globalXpBar" style="width:0%"></div></div>
            <div class="xp-text" id="globalXpText">0 / 400 XP</div>
        </div>

        <!-- Шкалы -->
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon">❤️</div><div class="stat-name">Здоровье</div><div class="stat-level" id="healthLvl">Ур.1</div><div class="stat-xp" id="healthXp">0 XP</div><div class="xp-bar-bg"><div class="xp-bar-fill" id="healthBar" style="width:0%"></div></div></div>
            <div class="stat-card"><div class="stat-icon">💪</div><div class="stat-name">Спорт</div><div class="stat-level" id="sportLvl">Ур.1</div><div class="stat-xp" id="sportXp">0 XP</div><div class="xp-bar-bg"><div class="xp-bar-fill" id="sportBar" style="width:0%"></div></div></div>
            <div class="stat-card"><div class="stat-icon">🧠</div><div class="stat-name">Самопознание</div><div class="stat-level" id="mindLvl">Ур.1</div><div class="stat-xp" id="mindXp">0 XP</div><div class="xp-bar-bg"><div class="xp-bar-fill" id="mindBar" style="width:0%"></div></div></div>
            <div class="stat-card"><div class="stat-icon">✨</div><div class="stat-name">Гигиена</div><div class="stat-level" id="hygieneLvl">Ур.1</div><div class="stat-xp" id="hygieneXp">0 XP</div><div class="xp-bar-bg"><div class="xp-bar-fill" id="hygieneBar" style="width:0%"></div></div></div>
        </div>

        <div class="section-title">📋 Обязательные</div>
        <div id="mandatoryTasks"></div>

        <div class="section-title">🎯 Доп. задания дня</div>
        <div id="dailyTasks"></div>

        <div class="section-title">🌙 Сон</div>
        <div class="sleep-section">
            <div class="sleep-status" id="sleepStatus">Ожидание...</div>
            <button class="btn btn-sleep" id="btnSleep" onclick="goSleep()">😴 Я лёг спать</button>
            <button class="btn btn-wake" id="btnWake" onclick="wakeUp()" style="display:none;">☀️ Я проснулся</button>
            <div class="penalty-warn" id="penaltyWarn"></div>
        </div>

        <div class="section-title">📜 Лог</div>
        <div class="log" id="log"><div class="log-item">Готов к прокачке! 🚀</div></div>
    </div>

    <script>
        // ============ ДАННЫЕ ============
        let player = JSON.parse(localStorage.getItem('lifeRpgSave')) || {
            health: { xp: 0, level: 1 },
            sport: { xp: 0, level: 1 },
            mind: { xp: 0, level: 1 },
            hygiene: { xp: 0, level: 1 },
            globalXp: 0, globalLevel: 1,
            sleepState: null, sleepDate: null, penaltyApplied: false,
            completedMandatory: [], completedDaily: [],
            dailyTasksDate: '', log: []
        };

        const XP_PER_LEVEL = 100;
        const GLOBAL_XP_PER_LEVEL = 400;

        const dailyTasksPool = [
            { name: '📖 Прочитать 10 страниц', reward: 30, stat: 'mind' },
            { name: '🧘 Медитация 5 минут', reward: 25, stat: 'mind' },
            { name: '🙏 Записать 3 благодарности', reward: 25, stat: 'mind' },
            { name: '⏱️ Планка 1 минута', reward: 30, stat: 'sport' },
            { name: '🚶 Прогулка 20 минут', reward: 35, stat: 'sport' },
            { name: '🤸 Растяжка 10 минут', reward: 30, stat: 'sport' },
            { name: '🥗 Съесть овощной салат', reward: 30, stat: 'health' },
            { name: '🍬 День без сладкого', reward: 40, stat: 'health' },
            { name: '🍵 Выпить зелёный чай', reward: 20, stat: 'health' },
            { name: '🚿 Контрастный душ', reward: 35, stat: 'hygiene' },
            { name: '🧴 Маска для лица', reward: 25, stat: 'hygiene' },
            { name: '🛏️ Сменить бельё', reward: 30, stat: 'hygiene' },
            { name: '🪟 Проветрить комнату', reward: 20, stat: 'health' },
            { name: '📝 Дневник мыслей', reward: 25, stat: 'mind' },
            { name: '🦵 50 приседаний', reward: 30, stat: 'sport' },
        ];

        const mandatoryTasks = [
            { id: 'water', name: '💧 1500+ мл воды', reward: 20, stat: 'health' },
            { id: 'abs', name: '🏋️ Тренировка на пресс', reward: 25, stat: 'sport' },
            { id: 'hygiene', name: '🪥 Зубы + умывание (пенка/лосьон)', reward: 20, stat: 'hygiene' },
        ];

        function getToday() { return new Date().toDateString(); }

        function generateDailyTasks() {
            let shuffled = [...dailyTasksPool].sort(() => Math.random() - 0.5);
            return shuffled.slice(0, 3).map((t, i) => ({ ...t, id: 'daily_' + i }));
        }

        function checkNewDay() {
            const today = getToday();
            if (player.dailyTasksDate !== today) {
                player.dailyTasksDate = today;
                player.completedMandatory = [];
                player.completedDaily = [];
                player.penaltyApplied = false;
                player.sleepState = null;
                player.sleepDate = null;
                localStorage.setItem('dailyTasksCache', JSON.stringify(generateDailyTasks()));
                addLog('🌅 Новый день! Задания обновлены.');
            }
        }

        function getCachedDailyTasks() {
            let cached = localStorage.getItem('dailyTasksCache');
            if (!cached) { cached = JSON.stringify(generateDailyTasks()); localStorage.setItem('dailyTasksCache', cached); }
            return JSON.parse(cached);
        }

        function getStatName(s) {
            return { health: '❤️ Здоровье', sport: '💪 Спорт', mind: '🧠 Самопознание', hygiene: '✨ Гигиена' }[s] || s;
        }

        function addXp(stat, amount) {
            if (!player[stat]) return;
            player[stat].xp += amount;
            player.globalXp += amount;
            addLog(`+${amount} XP → ${getStatName(stat)}`);
            while (player[stat].xp >= player[stat].level * XP_PER_LEVEL) {
                player[stat].xp -= player[stat].level * XP_PER_LEVEL;
                player[stat].level++;
                addLog(`🎉 ${getStatName(stat)} → Ур.${player[stat].level}!`);
            }
            while (player.globalXp >= player.globalLevel * GLOBAL_XP_PER_LEVEL) {
                player.globalXp -= player.globalLevel * GLOBAL_XP_PER_LEVEL;
                player.globalLevel++;
                addLog(`👑 ОБЩИЙ УРОВЕНЬ ${player.globalLevel}!`);
            }
            save(); render();
        }

        function spawnXpPopup(x, y, text) {
            const el = document.createElement('div');
            el.className = 'xp-popup';
            el.textContent = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        function completeTask(taskId, isMandatory, btnElement) {
            if (isMandatory) {
                if (player.completedMandatory.includes(taskId)) return;
                const task = mandatoryTasks.find(t => t.id === taskId);
                if (task) { player.completedMandatory.push(taskId); addXp(task.stat, task.reward); }
            } else {
                if (player.completedDaily.includes(taskId)) return;
                const tasks = getCachedDailyTasks();
                const task = tasks.find(t => t.id === taskId);
                if (task) { player.completedDaily.push(taskId); addXp(task.stat, task.reward); }
            }
            if (btnElement) {
                const rect = btnElement.getBoundingClientRect();
                spawnXpPopup(rect.left + rect.width/2 - 20, rect.top - 10, '+XP');
            }
        }

        function undoTaks(taskId, isMandatory) {
            if (isMandatory) {
                const idx = player.completedMandatory.indexOf(taskId);
                if (idx === -1) return;
                const task = mandatoryTasks.find(t => t.id === taskId);
                if (task) { player.completedMandatory.splice(idx, 1); addXp(task.stat, -task.reward); }
            } else {
                const idx = player.completedDaily.indexOf(taskId);
                if (idx === -1) return;
                const tasks = getCachedDailyTasks();
                const task = tasks.find(t => t.id === taskId);
                if (task) { player.completedDaily.splice(idx, 1); addXp(task.stat, -task.reward); }
            }
        }

        function goSleep() {
            player.sleepState = 'asleep';
            player.sleepDate = new Date().toISOString();
            player.penaltyApplied = false;
            addLog('😴 Отход ко сну отмечен');
            save(); render();
        }

        function wakeUp() {
            if (player.sleepState === 'asleep') {
                player.sleepState = 'awake';
                addLog('☀️ Подъём! Доброе утро!');
                save(); render();
            }
        }

        function checkSleepPenalty() {
            const h = new Date().getHours();
            if (h >= 2 && h < 8 && player.sleepState === null && !player.penaltyApplied) {
                for (let s of ['health', 'sport', 'mind', 'hygiene']) {
                    let p = Math.floor(player[s].xp * 0.1);
                    if (p > 0) { player[s].xp = Math.max(0, player[s].xp - p); player.globalXp = Math.max(0, player.globalXp - p); }
                }
                player.penaltyApplied = true;
                addLog('⚠️ ШТРАФ -10%: сон не отмечен после 02:00!');
                save(); render();
            }
        }

        function addLog(msg) {
            const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            player.log.unshift(`[${time}] ${msg}`);
            if (player.log.length > 60) player.log.pop();
        }

        function save() { localStorage.setItem('lifeRpgSave', JSON.stringify(player)); }

        function render() {
            document.getElementById('globalLevel').textContent = `Ур. ${player.globalLevel}`;
            let gxpFor = player.globalLevel * GLOBAL_XP_PER_LEVEL;
            document.getElementById('globalXpBar').style.width = Math.min(100, (player.globalXp / gxpFor) * 100) + '%';
            document.getElementById('globalXpText').textContent = `${player.globalXp} / ${gxpFor} XP`;

            function rs(stat, l, x, b) {
                document.getElementById(l).textContent = `Ур.${player[stat].level}`;
                let xpFor = player[stat].level * XP_PER_LEVEL;
                document.getElementById(x).textContent = `${player[stat].xp}/${xpFor} XP`;
                document.getElementById(b).style.width = Math.min(100, (player[stat].xp / xpFor) * 100) + '%';
            }
            rs('health', 'healthLvl', 'healthXp', 'healthBar');
            rs('sport', 'sportLvl', 'sportXp', 'sportBar');
            rs('mind', 'mindLvl', 'mindXp', 'mindBar');
            rs('hygiene', 'hygieneLvl', 'hygieneXp', 'hygieneBar');

            document.getElementById('mandatoryTasks').innerHTML = mandatoryTasks.map(t => {
                let d = player.completedMandatory.includes(t.id);
                return `<div class="task${d?' completed':''}"><div class="task-info"><div class="task-name">${t.name}</div><div class="task-reward">+${t.reward} XP → ${getStatName(t.stat)}</div></div><button class="btn ${d?'btn-undo':'btn-done'}" onclick="${d?`undoTaks('${t.id}',true)`:`completeTask('${t.id}',true,this)`}">${d?'↩':'✓'}</button></div>`;
            }).join('');

            let daily = getCachedDailyTasks();
            document.getElementById('dailyTasks').innerHTML = daily.map(t => {
                let d = player.completedDaily.includes(t.id);
                return `<div class="task daily-bonus${d?' completed':''}"><div class="task-info"><div class="task-name">${t.name}</div><div class="task-reward">+${t.reward} XP → ${getStatName(t.stat)}</div></div><button class="btn ${d?'btn-undo':'btn-done'}" onclick="${d?`undoTaks('${t.id}',false)`:`completeTask('${t.id}',false,this)`}">${d?'↩':'✓'}</button></div>`;
            }).join('');

            let ss = document.getElementById('sleepStatus');
            let bs = document.getElementById('btnSleep');
            let bw = document.getElementById('btnWake');
            let pw = document.getElementById('penaltyWarn');
            if (player.sleepState === 'asleep') {
                ss.textContent = '😴 Вы спите...'; bs.style.display = 'none'; bw.style.display = 'block'; pw.textContent = '';
            } else if (player.sleepState === 'awake') {
                ss.textContent = '☀️ Вы бодрствуете'; bs.style.display = 'block'; bw.style.display = 'none'; pw.textContent = '';
            } else {
                ss.textContent = '⚠️ Сон не отмечен'; bs.style.display = 'block'; bw.style.display = 'none';
                let h = new Date().getHours();
                pw.textContent = (h >= 2 && h < 8) ? '🔴 ШТРАФ -10% после 02:00!' : 'Не забудь отметить сон до 02:00';
            }

            document.getElementById('log').innerHTML = player.log.slice(0, 20).map(l => `<div class="log-item">${l}</div>`).join('') || '<div class="log-item">—</div>';
        }

        function init() {
            checkNewDay(); checkSleepPenalty(); render();
            setInterval(() => { checkSleepPenalty(); render(); }, 60000);
        }
        init();
    </script>
</body>
  </html>
